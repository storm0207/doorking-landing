  <style>
    :root {
      --navy: #1E3A8A;
      --gold: #C9A961;
      --cream: #F5F5DC;
      --navy-deep: #132a67;
      --text: #20304f;
      --text-soft: #5f6880;
      --card: rgba(255, 255, 255, 0.78);
      --border: rgba(201, 169, 97, 0.28);
      --shadow: 0 20px 60px rgba(30, 58, 138, 0.16);
      --radius: 28px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Noto Sans KR', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(201, 169, 97, 0.18), transparent 34%),
        radial-gradient(circle at top right, rgba(30, 58, 138, 0.14), transparent 32%),
        linear-gradient(135deg, #fcfcf4 0%, #f5f5dc 42%, #f7f4e8 100%);
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.08) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.22), transparent 55%);
      opacity: 0.35;
    }

    .page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 20px;
    }

    .card {
      width: 100%;
      max-width: 760px;
      position: relative;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.45);
      border-top: 1px solid rgba(255,255,255,0.8);
      border-left: 1px solid rgba(255,255,255,0.8);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: var(--radius);
      padding: 40px 34px 28px;
      text-align: center;
      overflow: hidden;
      opacity: 0;
      transform: translateY(22px);
      animation: fadeUp 0.9s ease forwards;
    }

    .card::before,
    .card::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      filter: blur(10px);
      z-index: 0;
    }

    .card::before {
      width: 180px;
      height: 180px;
      top: -80px;
      left: -50px;
      background: rgba(30, 58, 138, 0.12);
    }

    .card::after {
      width: 160px;
      height: 160px;
      right: -40px;
      bottom: -60px;
      background: rgba(201, 169, 97, 0.16);
    }

    .content {
      position: relative;
      z-index: 1;
    }

    .logo-wrap {
      width: 112px;
      height: 112px;
      margin: 0 auto 22px;
      display: grid;
      place-items: center;
      border-radius: 28px;
      background: linear-gradient(145deg, rgba(255,255,255,0.95), rgba(255,255,255,0.7));
      border: 1px solid rgba(201, 169, 97, 0.28);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.85), 0 14px 28px rgba(30, 58, 138, 0.10);
    }

    .brand-en {
      margin: 0;
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 800;
      letter-spacing: 0.08em;
      color: var(--navy);
      text-transform: uppercase;
    }

    .brand-kr {
      margin: 8px 0 0;
      font-size: clamp(1.05rem, 2.5vw, 1.35rem);
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--gold);
    }

    .tagline {
      margin: 18px auto 0;
      max-width: 520px;
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      font-weight: 600;
      color: var(--text);
      line-height: 1.7;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin: 28px 0 26px;
    }

    .meta-item {
      padding: 16px 18px;
      border-radius: 18px;
      background: rgba(255,255,255,0.56);
      border: 1px solid rgba(201, 169, 97, 0.18);
      text-align: left;
    }

    .meta-label {
      display: block;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 6px;
    }

    .meta-value {
      display: block;
      font-size: 1rem;
      font-weight: 600;
      color: var(--navy-deep);
      line-height: 1.6;
      word-break: keep-all;
    }

    .status {
      margin-top: 8px;
      padding: 18px 20px;
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(30, 58, 138, 0.06), rgba(201, 169, 97, 0.08));
      border: 1px solid var(--border);
    }

    .status p {
      margin: 0;
      line-height: 1.75;
    }

    .status .ko {
      font-size: 1.06rem;
      font-weight: 700;
      color: var(--navy);
    }

    .status .en {
      margin-top: 4px;
      font-size: 0.98rem;
      color: var(--text-soft);
    }

    .countdown {
      margin: 22px 0 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-width: 160px;
      padding: 12px 18px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(30, 58, 138, 0.10);
      color: var(--navy);
      box-shadow: 0 8px 24px rgba(30, 58, 138, 0.08);
      font-weight: 700;
    }

    .count-number {
      display: inline-grid;
      place-items: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--navy), #2f54b3);
      color: #fff;
      font-size: 1rem;
      box-shadow: 0 10px 20px rgba(30, 58, 138, 0.18);
    }

    .actions {
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-width: min(100%, 320px);
      padding: 16px 26px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--navy), #2749a8 60%, #335ac5 100%);
      color: #ffffff;
      font-size: 1rem;
      font-weight: 800;
      text-decoration: none;
      letter-spacing: 0.02em;
      box-shadow: 0 16px 32px rgba(30, 58, 138, 0.22);
      transition: transform 0.24s ease, box-shadow 0.24s ease, filter 0.24s ease;
      cursor: pointer;
    }

    .btn-primary:hover,
    .btn-primary:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 20px 36px rgba(30, 58, 138, 0.28);
      filter: brightness(1.05);
      outline: none;
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-note {
      font-size: 0.94rem;
      color: var(--text-soft);
      line-height: 1.7;
    }

    .footer {
      margin-top: 28px;
      font-size: 0.88rem;
      color: var(--text-soft);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(22px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 18px 14px;
      }

      .card {
        padding: 28px 18px 22px;
        border-radius: 24px;
      }

      .logo-wrap {
        width: 96px;
        height: 96px;
        margin-bottom: 18px;
      }

      .meta-grid {
        grid-template-columns: 1fr;
      }

      .meta-item {
        text-align: center;
      }

      .countdown {
        width: 100%;
      }

      .btn-primary {
        width: 100%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      html {
        scroll-behavior: auto;
      }

      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>

<body>
  <main class="page">
    <section class="card" aria-labelledby="page-title">
      <div class="content">
        <div class="logo-wrap" aria-hidden="true">
          <svg width="72" height="72" viewBox="0 0 128 128" role="img" aria-label="DOOR KING 로고" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="doorGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#1E3A8A" />
                <stop offset="60%" stop-color="#335ac5" />
                <stop offset="100%" stop-color="#C9A961" />
              </linearGradient>
            </defs>
            <path d="M46 20l8 9 10-9 10 9 8-9 7 18H39l7-18z" fill="url(#doorGradient)" />
            <path d="M36 88V53c0-16 12-29 28-29s28 13 28 29v35" fill="none" stroke="url(#doorGradient)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
            <path d="M48 88V58h32v30" fill="none" stroke="url(#doorGradient)" stroke-width="8" stroke-linejoin="round" />
            <line x1="64" y1="58" x2="64" y2="88" stroke="url(#doorGradient)" stroke-width="6" />
            <circle cx="58" cy="73" r="3.5" fill="#1E3A8A" />
          </svg>
        </div>

        <h1 id="page-title" class="brand-en">DOOR KING</h1>
        <p class="brand-kr">도어킹</p>
        <p class="tagline">프리미엄 디자인 중문 전문</p>

        <div class="meta-grid" aria-label="회사 정보">
          <div class="meta-item">
            <span class="meta-label">Service Area</span>
            <span class="meta-value">전주 | 완주 | 군산 | 익산</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Contact</span>
            <span class="meta-value">상담 010-5967-3851</span>
          </div>
        </div>

        <div class="status" aria-live="polite">
          <p class="ko">공식 블로그로 이동합니다...</p>
          <p class="en">Redirecting to official blog...</p>
          <div class="countdown" aria-label="자동 이동 카운트다운">
            <span>자동 이동까지</span>
            <span id="countNumber" class="count-number">3</span>
            <span>초</span>
            <span class="sr-only" id="countAnnounce">3초 후 이동</span>
          </div>
        </div>

        <div class="actions">
          <a id="goButton" class="btn-primary" href="https://blog.naver.com/kbs235800" aria-label="DOOR KING 공식 블로그 바로가기">
            블로그 바로가기
            <span aria-hidden="true">→</span>
          </a>
          <div class="btn-note">바로 이동이 필요하시면 버튼을 눌러 주세요 · Click the button for immediate access</div>
        </div>

        <footer class="footer">© 2026 DOOR KING. All rights reserved.</footer>
      </div>
    </section>
  </main>

  <script>
    (function () {
      'use strict';

      var blogUrl = 'https://blog.naver.com/kbs235800';
      var countdownSeconds = 3;
      var countNumber = document.getElementById('countNumber');
      var countAnnounce = document.getElementById('countAnnounce');
      var goButton = document.getElementById('goButton');
      var redirected = false;

      function redirectToBlog() {
        if (redirected) return;
        redirected = true;
        window.location.href = blogUrl;
      }

      function updateCountdown(value) {
        countNumber.textContent = String(value);
        countAnnounce.textContent = value + '초 후 이동';
      }

      goButton.addEventListener('click', function () {
        redirected = true;
      });

      updateCountdown(countdownSeconds);

      var intervalId = window.setInterval(function () {
        countdownSeconds -= 1;

        if (countdownSeconds <= 0) {
          updateCountdown(0);
          window.clearInterval(intervalId);
          window.setTimeout(redirectToBlog, 180);
          return;
        }

        updateCountdown(countdownSeconds);
      }, 1000);
    })();
  </script>
